# Copy this file to input_parameter_XXXX.toml and change case_id/parameters.
# This reference file is intentionally not numbered, so batch runs ignore it.

case_id = 1
lam = 0.033333
Pe = 10
Pe2 = 10
eps = 0.1
Da = 100
K0 = 1
ny = 50
xpo_l = 0.33333
xpo_r = 0.66667
endT = 60
total_count = 300
coeff_dt = 0.1
x_ini_posi = 5
alpha = 0.01
Sc = 16667

# Optional mesh overrides.
# Omit this section for the original uniform baseline grid.
[mesh]
y_profile = "uniform"      # uniform | wall_tanh
wall_tanh_strength = 2.5   # used only when y_profile = "wall_tanh"

# Optional runtime overrides.
# If omitted, defaults come from include/config.h.
# If CLI flags set the same field, CLI values take precedence.
[runtime]
stats_interval = 1000
stability_check_interval = 100
checkpoint_interval = 50000
output_matlab = true
output_tecplot = false
enable_dense_dump = true
dense_dump_start = 4.0
dense_dump_count = 16
convergence_threshold = 0.001
